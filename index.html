<script>
  let docCount = 0;
  const API = 'https://desktop-eye.onrender.com';

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const status = document.getElementById('uploadStatus');
    status.textContent = `Reading ${file.name}…`;
    status.className = 'upload-status';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${API}/upload`, {
        method: 'POST',
        body: formData
      });

      const data = await res.json();

      if (data.status === 'ok') {
        docCount++;
        document.getElementById('docCount').textContent =
          `${docCount} document${docCount > 1 ? 's' : ''}`;
        status.textContent = `${file.name} is ready`;
        status.className = 'upload-status ok';
        hideWelcome();
        addAIMessage(`I've read <strong>${escHtml(file.name)}</strong>. What would you like to know about it?`, []);
      } else {
        status.textContent = data.message || 'Could not load file';
        status.className = 'upload-status err';
      }
    } catch {
      status.textContent = 'Cannot connect — backend is unavailable';
      status.className = 'upload-status err';
    }

    e.target.value = '';
  });

  async function sendQuestion() {
    const input = document.getElementById('questionInput');
    const q = input.value.trim();
    if (!q) return;

    input.value = '';
    hideWelcome();
    addUserMessage(q);

    const thinkId = 'think-' + Date.now();
    addThinking(thinkId);

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: q })
      });

      const data = await res.json();

      document.getElementById(thinkId)?.remove();
      addAIMessage(data.answer || 'No response received.', data.sources || []);
    } catch {
      document.getElementById(thinkId)?.remove();
      addAIMessage('Could not connect to the server.', []);
    }
  }

  function addUserMessage(text) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-avatar" style="background:var(--accent);color:white;font-size:12px;font-weight:600;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">U</div>
      <div class="msg-bubble">${escHtml(text)}</div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addAIMessage(html, sources) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row ai';

    const srcHtml = sources.length
      ? `<div class="msg-sources">
           <span class="sources-label">Sources</span>
           ${sources.map(s => `<span class="source-tag">${escHtml(s)}</span>`).join('')}
         </div>`
      : '';

    row.innerHTML = `
      <div class="msg-avatar" style="background:#1d1d1f;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">
        <svg width="16" height="16" viewBox="0 0 32 32" fill="none">
          <path d="M4 16 C8 8, 24 8, 28 16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M4 16 C8 24, 24 24, 28 16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="16" r="5" fill="white"/>
          <circle cx="14" cy="14" r="1.5" fill="#1d1d1f"/>
        </svg>
      </div>
      <div class="msg-bubble">${html}${srcHtml}</div>`;

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addThinking(id) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = id;
    row.innerHTML = `
      <div class="msg-avatar" style="background:#1d1d1f;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">
        <svg width="16" height="16" viewBox="0 0 32 32" fill="none">
          <path d="M4 16 C8 8, 24 8, 28 16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M4 16 C8 24, 24 24, 28 16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="16" r="5" fill="white"/>
          <circle cx="14" cy="14" r="1.5" fill="#1d1d1f"/>
        </svg>
      </div>
      <div class="msg-bubble">
        <div class="thinking-dots"><span></span><span></span><span></span></div>
      </div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideWelcome() {
    document.getElementById('welcome')?.remove();
  }

  function useHint(el) {
    document.getElementById('questionInput').value = el.textContent;
    document.getElementById('questionInput').focus();
  }

  async function clearChat() {
    try {
      await fetch(`${API}/clear`, { method: 'POST' });
    } catch {}

    const msgs = document.getElementById('messages');
    msgs.innerHTML = `
      <div class="welcome" id="welcome">
        <h2>What would you like to know?</h2>
        <p>Add a document above and ask me anything. I'll find the answers and show you exactly where they came from.</p>
        <div class="hint-chips">
          <div class="hint-chip" onclick="useHint(this)">Summarize this document</div>
          <div class="hint-chip" onclick="useHint(this)">What are the key points?</div>
          <div class="hint-chip" onclick="useHint(this)">List the main skills</div>
          <div class="hint-chip" onclick="useHint(this)">What experience is mentioned?</div>
        </div>
      </div>`;
  }

  function escHtml(t) {
    return String(t)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
